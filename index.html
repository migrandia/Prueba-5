<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Boda | Ana & Carlos</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300&family=Tenor+Sans&display=swap" rel="stylesheet">
    
    <script>
        // ==========================================
        // CONFIGURA AQUÍ TUS ADORNOS (Links de Dropbox con &raw=1)
        // ==========================================
        const URL_FLOR_ESQUINA_SUPERIOR = "https://www.dropbox.com/scl/fi/v62s4p179ly9n9pdtx81c/flower-corner.png?rlkey=xyz123&raw=1";
        const URL_FLOR_SEPARADOR_1      = "https://www.dropbox.com/scl/fi/v62s4p179ly9n9pdtx81c/flower-corner.png?rlkey=xyz123&raw=1";
        const URL_FLOR_SEPARADOR_2      = "https://www.dropbox.com/scl/fi/v62s4p179ly9n9pdtx81c/flower-corner.png?rlkey=xyz123&raw=1";
        const URL_FLOR_ESQUINA_INFERIOR = "https://www.dropbox.com/scl/fi/v62s4p179ly9n9pdtx81c/flower-corner.png?rlkey=xyz123&raw=1";
        
        // Nota: He puesto links de ejemplo. Cámbialos por tus archivos PNG transparentes.
    </script>

    <style>
        :root { --dorado: #bca080; --oscuro: #1a1a1a; --crema: #fdfcf9; }
        body { margin: 0; background: #eee; font-family: 'Tenor Sans', sans-serif; overflow-x: hidden; }
        .wrapper { max-width: 480px; margin: 0 auto; background: var(--crema); position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.2); }
        
        /* ESTILO PARA LOS ADORNOS */
        .adorno { position: absolute; z-index: 10; pointer-events: none; opacity: 0.6; width: 130px; }
        .separador { display: block; margin: 30px auto; width: 80px; opacity: 0.5; }

        /* REPRODUCTOR */
        #music-box { position: fixed; top: 20px; right: 20px; z-index: 1000; background: white; border: 1px solid var(--dorado); padding: 10px 18px; border-radius: 50px; cursor: pointer; display: flex; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        /* PORTADA */
        .hero { position: relative; height: 100vh; color: white; text-align: center; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
        .hero-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.6)), url('https://www.dropbox.com/scl/fi/pd9mjnnpuz1awyw4memr7/novios-de-frente.jpg?rlkey=fzbs6iftt0125yat387uxnbei&raw=1') center/cover; z-index: 1; }
        .hero-text { z-index: 2; text-transform: uppercase; letter-spacing: 5px; }
        .hero-text h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.8rem; margin: 15px 0; font-weight: normal; }

        section { padding: 60px 30px; text-align: center; position: relative; }
        .img-full { width: 100%; display: block; object-fit: cover; border-radius: 8px; }
        .serif { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.6rem; margin-bottom: 20px; line-height: 1.4; color: #444; }
        .historia-texto { font-size: 0.95rem; line-height: 1.8; color: #666; font-style: italic; margin-bottom: 30px; }
        
        .timer-container { display: flex; justify-content: center; gap: 15px; margin: 20px 0; padding: 25px 0; border-top: 1px solid #f2ede4; border-bottom: 1px solid #f2ede4; }
        .t-val { display: block; font-size: 1.5rem; color: var(--dorado); font-weight: bold; }
        .t-lab { font-size: 0.6rem; text-transform: uppercase; opacity: 0.7; }

        .btn-maps { display: inline-block; padding: 15px 30px; border: 1px solid var(--dorado); color: var(--dorado); text-decoration: none; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; margin-top: 15px; }
    </style>
</head>
<body onclick="iniciarMusicaAlPrimerClic()">

    <div id="music-box" onclick="toggleMusic()">
        <span id="m-icon" style="margin-right: 8px;">▶</span>
        <span style="font-size: 10px; letter-spacing: 1px;" id="m-text">MUSICA</span>
    </div>
    
    <audio id="cancion" loop>
        <source src="https://www.dropbox.com/scl/fi/80hypdxkg24wx6x7oael2/En-Tus-Manos-Se-or.mp3?rlkey=j4di62c9sgj4txgwbpikcngp3&raw=1" type="audio/mpeg">
    </audio>

    <div class="wrapper">
        
        <script>document.write(`<img src="${URL_FLOR_ESQUINA_SUPERIOR}" class="adorno" style="top:-10px; left:-10px;">`);</script>

        <div class="hero">
            <div class="hero-bg"></div>
            <div class="hero-text">
                <p style="font-size: 0.8rem; letter-spacing: 4px;">NUESTRA BODA</p>
                <h1>ANA & CARLOS</h1>
                <div style="width: 50px; height: 1px; background: white; margin: 20px auto; opacity: 0.8;"></div>
                <p style="font-size: 0.9rem; letter-spacing: 3px;">14 . FEBRERO . 2026</p>
            </div>
        </div>

        <section>
            <p style="font-size: 0.7rem; letter-spacing: 4px; color: var(--dorado); margin-bottom: 10px;">NUESTRA HISTORIA</p>
            <p class="serif">Como en un sueño...</p>
            <p class="historia-texto">"Descubrimos que la vida es mucho más bella de tu mano..."</p>
            <img src="https://www.dropbox.com/scl/fi/yxcamxu6ark6qj5jf9da1/novios-corriendo.jpg?rlkey=wt1aapl5nh89afj7n53zou3qt&raw=1" class="img-full" style="height: 380px;">
            
            <script>document.write(`<img src="${URL_FLOR_SEPARADOR_1}" class="separador">`);</script>
            
            <p class="serif">"Nuestro viaje apenas comienza..."</p>
            <img src="https://www.dropbox.com/scl/fi/snutqjlkrv7oglqswicq2/novios-besandoce.jpg?rlkey=ad7z44z08wgr0f4wcd20et7nz&raw=1" class="img-full" style="height: 380px;">
        </section>

        <section>
            <script>document.write(`<img src="${URL_FLOR_SEPARADOR_2}" class="separador" style="transform:rotate(180deg)">`);</script>
            
            <p style="font-size: 0.7rem; letter-spacing: 3px; color: var(--dorado);">FALTAN POCOS DÍAS</p>
            <div class="timer-container">
                <div class="t-block"><span class="t-val" id="d">00</span><span class="t-lab">Días</span></div>
                <div class="t-block"><span class="t-val" id="h">00</span><span class="t-lab">Hrs</span></div>
                <div class="t-block"><span class="t-val" id="m">00</span><span class="t-lab">Min</span></div>
                <div class="t-block"><span class="t-val" id="s">00</span><span class="t-lab">Seg</span></div>
            </div>
        </section>

        <div style="position: relative; overflow: hidden;">
            <img src="https://www.dropbox.com/scl/fi/pd9mjnnpuz1awyw4memr7/novios-de-frente.jpg?rlkey=fzbs6iftt0125yat387uxnbei&raw=1" class="img-full" style="border-radius: 0;">
            
            <script>document.write(`<img src="${URL_FLOR_ESQUINA_INFERIOR}" class="adorno" style="bottom:-10px; right:-10px; transform:rotate(180deg)">`);</script>
        </div>
        
        <section style="padding: 80px 30px;">
            <a href="https://wa.me/525654252153" target="_blank" class="btn-maps" style="background: var(--oscuro); color: white; border: none; width: 85%;">Confirmar Asistencia</a>
        </section>
    </div>

    <script>
        var musicaIniciada = false;
        function iniciarMusicaAlPrimerClic() { if (!musicaIniciada) { toggleMusic(); musicaIniciada = true; } }
        function toggleMusic() {
            var audio = document.getElementById('cancion');
            var icon = document.getElementById('m-icon');
            var txt = document.getElementById('m-text');
            if (audio.paused) { audio.play(); icon.innerHTML = "⏸"; txt.innerHTML = "PAUSAR"; } 
            else { audio.pause(); icon.innerHTML = "▶"; txt.innerHTML = "MUSICA"; }
        }
        function actualizarContador() {
            const fechaBoda = new Date("Feb 14, 2026 18:00:00").getTime();
            const ahora = new Date().getTime();
            const faltante = fechaBoda - ahora;
            if (faltante > 0) {
                document.getElementById('d').innerText = Math.floor(faltante / 86400000);
                document.getElementById('h').innerText = Math.floor((faltante % 86400000) / 3600000);
                document.getElementById('m').innerText = Math.floor((faltante % 3600000) / 60000);
                document.getElementById('s').innerText = Math.floor((faltante % 60000) / 1000);
            }
        }
        actualizarContador(); setInterval(actualizarContador, 1000);
    </script>
</body>
</html>
