<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Boda | Ana & Carlos</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300&family=Tenor+Sans&display=swap" rel="stylesheet">
    <style>
        :root { --dorado: #bca080; --oscuro: #1a1a1a; --crema: #fdfcf9; }
        body { margin: 0; background: #eee; font-family: 'Tenor Sans', sans-serif; }
        .wrapper { max-width: 480px; margin: 0 auto; background: var(--crema); position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.2); }
        
        /* CONTROLES DE MÚSICA VISIBLES */
        #music-box {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            background: white; border: 1px solid var(--dorado);
            padding: 12px 20px; border-radius: 50px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; align-items: center;
        }
        .music-icon { margin-right: 8px; font-size: 14px; }

        section { padding: 60px 30px; text-align: center; }
        .img-full { width: 100%; display: block; object-fit: cover; }
        .serif { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.9rem; margin-bottom: 20px; }
        
        /* CONTADOR REHECHO */
        .timer-container { display: flex; justify-content: center; gap: 15px; margin: 30px 0; padding: 25px 0; border-top: 1px solid #eee; border-bottom: 1px solid #eee; }
        .t-block { text-align: center; min-width: 60px; }
        .t-val { display: block; font-size: 1.5rem; color: var(--dorado); font-weight: bold; }
        .t-lab { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; }

        .btn-maps {
            display: inline-block; padding: 15px 30px; border: 1px solid var(--dorado);
            color: var(--dorado); text-decoration: none; font-size: 0.7rem;
            letter-spacing: 2px; text-transform: uppercase; margin-top: 15px; transition: 0.3s;
        }
        .btn-maps:hover { background: var(--dorado); color: white; }
    </style>
</head>
<body>

    <div id="music-box" onclick="toggleMusic()">
        <span class="music-icon" id="m-icon">▶</span>
        <span style="font-size: 10px; letter-spacing: 1px;" id="m-text">PLAY MÚSICA</span>
    </div>
    
    <audio id="cancion" loop>
        <source src="https://www.dropbox.com/scl/fi/80hypdxkg24wx6x7oael2/En-Tus-Manos-Se-or.mp3?rlkey=j4di62c9sgj4txgwbpikcngp3&raw=1" type="audio/mpeg">
    </audio>

    <div class="wrapper">
        
        <img src="https://replicate.delivery/xpbkg/fD40Ym9NnO71M92Kj1hR8T5eR3E9g5H2f4E1A9D4D1B9D4D1B/output.jpg" class="img-full" style="height: 100vh;">

        <section>
            <p style="font-size: 0.7rem; letter-spacing: 3px; color: var(--dorado);">NUESTRO ENLACE</p>
            <p class="serif">La Ceremonia Religiosa</p>
            <p><strong>Parroquia Santo Tomas Apostol</strong><br>Centro, Tunkás, Yucatán</p>
            <p style="font-size: 0.9rem; margin-top: 10px;">18:00 Horas</p>
            <a href="https://www.google.com/maps/place/Parroquia+de+Santo+Tom%C3%A1s+de+Ap%C3%B3stol" target="_blank" class="btn-maps">Ver mapa de la Iglesia</a>
        </section>

        <section style="background: #f9f8f5;">
            <p style="font-size: 0.7rem; letter-spacing: 3px;">FALTAN SOLO 60 Dias</p>
            <div class="timer-container">
                <div class="t-block"><span class="t-val" id="d">00</span><span class="t-lab">Días</span></div>
                <div class="t-block"><span class="t-val" id="h">00</span><span class="t-lab">Hrs</span></div>
                <div class="t-block"><span class="t-val" id="m">00</span><span class="t-lab">Min</span></div>
                <div class="t-block"><span class="t-val" id="s">00</span><span class="t-lab">Seg</span></div>
            </div>
        </section>

        <section>
            <p class="serif">La Recepción</p>
            <p><strong>Villa Lucila</strong><br>Calle 34, Tunkás, Yucatán</p>
            <p style="font-size: 0.9rem; margin-top: 10px;">20:30 Horas</p>
            <a href="https://www.google.com/maps/search/?api=1&query=Villa+Lucila+Tunkas+Yucatan" target="_blank" class="btn-maps">Ver mapa del Evento</a>
        </section>

        <img src="https://replicate.delivery/xpbkg/fD40Ym9NnO71M92Kj1hR8T5eR3E9g5H2f4E1A9D4D1B9D4D1B/output.jpg" class="img-full">
        
        <section>
            <p class="serif" style="font-size: 1.4rem;">¡Te esperamos!</p>
        </section>
    </div>

    <script>
        // Lógica de música corregida
        function toggleMusic() {
            var audio = document.getElementById('cancion');
            var icon = document.getElementById('m-icon');
            var txt = document.getElementById('m-text');
            if (audio.paused) {
                audio.play();
                icon.innerHTML = "⏸";
                txt.innerHTML = "PAUSAR";
            } else {
                audio.pause();
                icon.innerHTML = "▶";
                txt.innerHTML = "PLAY MÚSICA";
            }
        }

        // Contador corregido (Fecha: 14 de Febrero 2026)
        function actualizarContador() {
            const fechaBoda = new Date("Feb 14, 2026 18:00:00").getTime();
            const ahora = new Date().getTime();
            const faltante = fechaBoda - ahora;

            if (faltante > 0) {
                document.getElementById('d').innerText = Math.floor(faltante / (1000 * 60 * 60 * 24));
                document.getElementById('h').innerText = Math.floor((faltante % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                document.getElementById('m').innerText = Math.floor((faltante % (1000 * 60 * 60)) / (1000 * 60));
                document.getElementById('s').innerText = Math.floor((faltante % (1000 * 60)) / 1000);
            }
        }
        setInterval(actualizarContador, 1000);
        actualizarContador(); // Ejecución inmediata al cargar
    </script>
</body>
</html>
